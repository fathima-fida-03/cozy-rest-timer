<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Sweet Rest Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="heart-container"></div>

    <div class="glass-card">
        <div class="main-icon">💗</div> 
        <h1>Rest time, my dear friend</h1>
        
        <div id="timer">05:00</div>

        <div class="button-group">
            <button id="start-btn">Start Break</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <audio id="break-bg-sound" src="https://www.soundjay.com/nature/sounds/rain-01.mp3" loop preload="auto"></audio>
    <audio id="success-sound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
